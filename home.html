<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwindcss & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- style  -->
    <link rel="stylesheet" href="./style.css">
    <title>Github-Issue-Tracker</title>
    <style>

    </style>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm px-12">
            <div class="flex-1">
                <a href="./home.html" class="btn btn-ghost text-xl"><i class="fa-brands fa-github"></i>Github Issue
                    Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>
                <button class="btn btn-primary ">+ New Issue</button>
            </div>
        </div>
    </header>




    <section id="tabe" class="w-10/12 mx-auto shadow mt-16 p-5 rounded-md">
        <button onclick="switchTab('all')" id="all-btn" class="btn btn-primary">All</button>
        <button onclick="switchTab('open')" id="open-btn" class="btn">Open</button>
        <button onclick="switchTab('close')" id="close-btn" class="btn">Closed</button>
    </section>
    <section id="Track-and-manage" class="w-10/12 mx-auto shadow mt-5 p-5 flex justify-between items-center">
        <div class="count flex gap-3">
            <img src="./assets/Aperture.png" alt="">
            <div class="con">
                <h2 class="text-xl font-semibold"><span id="total">50 </span> Issues</h2>
                <p class="text-gray-500">Track and manage your project issues</p>
            </div>
        </div>
        <div class="color-count flex gap-3 items-center">
            <div class="inline-grid *:[grid-area:1/1]">
                <div aria-label="status" class="status status-success"></div>
            </div> Open
            <div class="inline-grid *:[grid-area:1/1]">
                <div class="status status-primary "></div>
            </div> Closed
        </div>

    </section>
    <section id="main-content" class="w-10/12 mx-auto bg-gray-100 p-5 grid grid-cols-4 gap-3">
        
        
        
    </section>



    <script src="./scrict.js"></script>
</body>

</html>
